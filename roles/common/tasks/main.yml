- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

- name: Check installed Helm version
  ansible.builtin.command: helm version --short
  register: common_helm_version_check
  failed_when: false
  changed_when: false

- name: Download Helm archive
  ansible.builtin.get_url:
    url: >-
      {{
        'https://get.helm.sh/helm-' ~ helm_version ~
        '-linux-' ~ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] ~
        '.tar.gz'
      }}
    dest: /tmp/helm.tar.gz
    mode: "0644"
  when: >-
    common_helm_version_check.rc != 0 or
    helm_version not in common_helm_version_check.stdout

- name: Ensure Helm extract directory exists
  ansible.builtin.file:
    path: /tmp/helm-extract
    state: directory
    mode: "0755"
  when: >-
    common_helm_version_check.rc != 0 or
    helm_version not in common_helm_version_check.stdout

- name: Extract Helm archive
  ansible.builtin.unarchive:
    src: /tmp/helm.tar.gz
    dest: /tmp/helm-extract
    remote_src: true
  when: >-
    common_helm_version_check.rc != 0 or
    helm_version not in common_helm_version_check.stdout

- name: Install Helm binary
  ansible.builtin.copy:
    src: >-
      {{
        '/tmp/helm-extract/linux-' ~ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] ~
        '/helm'
      }}
    dest: /usr/local/bin/helm
    mode: "0755"
    remote_src: true
  when: >-
    common_helm_version_check.rc != 0 or
    helm_version not in common_helm_version_check.stdout

- name: Configure hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Ensure hostname is present in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ hostname }}"
    state: present

- name: Ensure systemd-timesyncd is installed
  ansible.builtin.apt:
    name: systemd-timesyncd
    state: present

- name: Ensure time sync service is enabled
  ansible.builtin.service:
    name: systemd-timesyncd
    state: started
    enabled: true

- name: Disable swap immediately when present
  ansible.builtin.command: swapoff -a
  when: ansible_facts['swaptotal_mb'] | int > 0
  changed_when: ansible_facts['swaptotal_mb'] | int > 0

- name: Remove swap entries from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)([^\n]+\s+swap\s+[^\n]+)$'
    replace: '# \1'

- name: Enable unattended upgrades service
  ansible.builtin.service:
    name: unattended-upgrades
    state: started
    enabled: true

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
