name: Renovate

on:
  schedule:
    - cron: '23 5 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4

      - name: Renovate
        uses: renovatebot/github-action@v43.0.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        # env:
        #   LOG_LEVEL: debug
