apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/cert-manager/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: platform-config
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m0s
  path: ./infrastructure/cert-manager/issuers
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
